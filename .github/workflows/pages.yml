name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pages
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: bundle install

      - name: Build site
        run: bundle exec jekyll build

      - name: Sync built site to docs/
        run: |
          rm -rf ../docs
          cp -r _site ../docs
          touch ../docs/.nojekyll

      - name: Commit docs/ for GitHub Pages
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No docs changes to commit" && exit 0
          git commit -m "chore: update docs site from pages build"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
